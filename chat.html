<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  </head>
  <body>
    <h1>Socket.IO Test</h1>
    <input id="msg" placeholder="Type message" />
    <button onclick="sendMessage()">Send</button>

    <div id="messages"></div>

    <script>
      const socket = io("http://localhost:5000");

      // Change values here for testing
      const userId = prompt("Enter userId:", "101");
      const userType = prompt("Enter userType:", "team"); // "team" | "evaluator" | "admin"

      socket.on("connect", () => {
        console.log("Connected:", socket.id);

        if (userType === "admin") {
          socket.emit("adminJoin");
        }

        socket.emit("joinChat", { userId, userType });
      });

      socket.on("receiveMessage", (msg) => {
        console.log("Message received:", msg);
        const div = document.createElement("div");
        div.innerText = `${msg.from.userType} ${msg.from.userId}: ${msg.message}`;
        document.getElementById("messages").appendChild(div);
      });

      socket.on("newUser", (u) => {
        console.log("New user joined:", u);
      });

      function sendMessage() {
        const text = document.getElementById("msg").value;
        if (!text.trim()) return;

        if (userType === "admin") {
          // send to a specific team or evaluator
          const toUserId = prompt("Enter recipient ID (e.g., 101)");
          const toUserType = prompt("Enter recipient type (team/evaluator)");
          socket.emit("sendMessage", { toUserId, toUserType, message: text });
        } else {
          // send to admin
          socket.emit("sendMessage", {
            toUserId: "admin",
            toUserType: "admin",
            message: text,
          });
        }
        document.getElementById("msg").value = "";
      }
    </script>
  </body>
</html>
